<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Course System</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Epilogue:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

<header>
  <div>
    <h1>Student Course System</h1>
    <div class="subtitle">Microservices · 3 independent services</div>
  </div>
  <div class="health-bar">
    <div class="health-pill" id="hp-8001"><span class="dot"></span>:8001 students</div>
    <div class="health-pill" id="hp-8002"><span class="dot"></span>:8002 courses</div>
    <div class="health-pill" id="hp-8003"><span class="dot"></span>:8003 enrollments</div>
  </div>
</header>

<div class="page">

  <!-- ── STUDENTS ── -->
  <div class="section">
    <div class="section-header">
      <div class="section-icon icon-blue">👤</div>
      <div>
        <div class="section-title">Students</div>
        <div class="section-port">localhost:8001</div>
      </div>
      <span class="count-badge badge-blue" id="cnt-students">0</span>
    </div>

    <div class="form-area">
      <div class="form-row">
        <div class="field">
          <label>Full Name</label>
          <input type="text" id="s-name" placeholder="e.g. Alice Santos"/>
        </div>
      </div>
      <div class="form-row">
        <div class="field">
          <label>Email</label>
          <input type="email" id="s-email" placeholder="e.g. alice@school.com"/>
        </div>
      </div>
      <button class="add-btn btn-blue" onclick="addStudent()">+ Add Student</button>
    </div>

    <div class="list-area" id="list-students">
      <div class="empty"><div class="empty-icon">👤</div>No students yet</div>
    </div>
  </div>

  <!-- ── COURSES ── -->
  <div class="section">
    <div class="section-header">
      <div class="section-icon icon-amber">📚</div>
      <div>
        <div class="section-title">Courses</div>
        <div class="section-port">localhost:8002</div>
      </div>
      <span class="count-badge badge-amber" id="cnt-courses">0</span>
    </div>

    <div class="form-area">
      <div class="form-row">
        <div class="field">
          <label>Course Title</label>
          <input type="text" id="c-title" placeholder="e.g. Math 101"/>
        </div>
      </div>
      <div class="form-row">
        <div class="field">
          <label>Credits</label>
          <input type="number" id="c-credits" placeholder="e.g. 3" min="1" max="9"/>
        </div>
      </div>
      <button class="add-btn btn-amber" onclick="addCourse()">+ Add Course</button>
    </div>

    <div class="list-area" id="list-courses">
      <div class="empty"><div class="empty-icon">📚</div>No courses yet</div>
    </div>
  </div>

  <!-- ── ENROLLMENTS ── -->
  <div class="section">
    <div class="section-header">
      <div class="section-icon icon-green">📋</div>
      <div>
        <div class="section-title">Enrollments</div>
        <div class="section-port">localhost:8003</div>
      </div>
      <span class="count-badge badge-green" id="cnt-enrollments">0</span>
    </div>

    <div class="form-area">
      <div class="form-row">
        <div class="field">
          <label>Student</label>
          <select id="e-student">
            <option value="">— select student —</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="field">
          <label>Course</label>
          <select id="e-course">
            <option value="">— select course —</option>
          </select>
        </div>
      </div>
      <button class="add-btn btn-green" onclick="addEnrollment()">+ Enroll</button>
    </div>

    <div class="list-area" id="list-enrollments">
      <div class="empty"><div class="empty-icon">📋</div>No enrollments yet</div>
    </div>
  </div>

</div>

<div id="toasts"></div>

<script src="app.js"></script>
</body>
</html>
